version = 1
requires-python = ">=3.11"
resolution-markers = [
    "sys_platform == 'win32' and python_version >= '3.11'",
    "(sys_platform == 'linux' or sys_platform == 'darwin') and python_full_version >= '3.11.0'",
    "sys_platform != 'win32' and sys_platform != 'linux' and sys_platform != 'darwin'",
]

# Workspace root (virtual)
[[package]]
name = "workspace-root"
version = "0.0.0"
source = { virtual = "." }

[package.dev-dependencies]
dev = [
    { name = "requests", specifier = ">=2.31" },
    { name = "colorama", specifier = ">=0.4.6", marker = "sys_platform == 'win32' and python_version >= '3.11'" },
    { name = "uvloop", specifier = ">=0.19", marker = "(sys_platform == 'linux' or sys_platform == 'darwin') and python_full_version >= '3.11.0'" },
]

[package.dependency-groups]
integration = [
    { name = "httpx", specifier = ">=0.27" },
]
audit = [
    { name = "pip-audit", specifier = ">=2.7" },
]

